name: "CI RISC-V"

#* To avoid duplicate jobs running when both push and PR is satisfied, we use this:
#* https://github.com/orgs/community/discussions/26940#discussioncomment-5686753
on:
  push:
    branches: [main, dev-ci, "rls-*"]
    paths:
      - ".github/automation/riscv/**"
      - ".github/workflows/ci-riscv.yml"
      - "cmake/**"
      - "examples/**"
      - "include/**"
      - "src/common/**"
      - "src/cpu/*"
      - "src/cpu/rv64/**"
      - "tests/**"
      - "CMakeLists.txt"
  pull_request:
     types: [opened, synchronize, reopened]
     paths:
      - ".github/automation/riscv/**"
      - ".github/workflows/ci-riscv.yml"
      - "cmake/**"
      - "examples/**"
      - "include/**"
      - "src/common/**"
      - "src/cpu/*"
      - "src/cpu/rv64/**"
      - "tests/**"
      - "CMakeLists.txt"
  #* allow manual trigger of workflow when needed.
  workflow_dispatch:

#* Stop stale workflows when pull requests are updated: https://stackoverflow.com/a/70972844
#* Does not apply to the main branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Declare default permissions as read only.
permissions: read-all

jobs:
  # Decide the test scope from the change set: a PR (or push) that touches
  # src/cpu/rv64/** runs the full CI test set (balanced split, VLEN 128 + 256);
  # anything else runs SMOKE so it does not slow non-RISC-V reviews. Manual or
  # edge runs default to CI. Drives the build testset and the test matrix below.
  scope:
    runs-on: ubuntu-24.04
    outputs:
      scope: ${{ steps.decide.outputs.scope }}
      testset: ${{ steps.decide.outputs.testset }}
      matrix: ${{ steps.decide.outputs.matrix }}
    steps:
      - name: Checkout oneDNN
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Decide test scope
        id: decide
        run: bash .github/automation/riscv/ci-scope.sh
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}

  build:
    needs: scope
    strategy:
      matrix:
        config: [
          { name: riscv-build, label: ubuntu-24.04, threading: OMP, toolset: gcc, build: RelWithAssert }
        ]

    name: ${{ matrix.config.name }}, ${{ matrix.config.toolset }}, ${{ matrix.config.threading }}, ${{ matrix.config.build }}
    runs-on: ${{ matrix.config.label }}
    steps:
      - name: Checkout oneDNN
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          path: oneDNN

      - name: Read version file
        id: get-versions
        run: |
          content=`cat ${{ github.workspace }}/oneDNN/.github/automation/riscv/ci.json`
          content="${content//[$'\t\r\n$ ']}"
          echo "output=$content" >> $GITHUB_OUTPUT

      # Note: This will create a github actions cache
      - name: Get latest CMake and Ninja
        uses: lukka/get-cmake@56d043d188c3612951d8755da8f4b709ec951ad6 # v3.31.6
        with:
          cmakeVersion: 3.31.0
          ninjaVersion: 1.12.0

      # Install cross-compilation tools
      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-${{ fromJson(steps.get-versions.outputs.output).dependencies.gcc }}-riscv64-linux-gnu g++-${{ fromJson(steps.get-versions.outputs.output).dependencies.gcc }}-riscv64-linux-gnu

      - name: Configure oneDNN
        run: ${{ github.workspace }}/oneDNN/.github/automation/riscv/build.sh
        working-directory: ${{ github.workspace }}/oneDNN
        env:
          BUILD_TOOLSET: ${{ matrix.config.toolset }}
          CMAKE_BUILD_TYPE: ${{ matrix.config.build }}
          CMAKE_GENERATOR: Ninja
          GCC_VERSION: ${{ fromJson(steps.get-versions.outputs.output).dependencies.gcc }}
          ONEDNN_ACTION: configure
          ONEDNN_TEST_SET: ${{ needs.scope.outputs.testset }}
          ONEDNN_THREADING: ${{ matrix.config.threading }}

      - name: Build oneDNN
        run: ${{ github.workspace }}/oneDNN/.github/automation/riscv/build.sh
        working-directory: ${{ github.workspace }}/oneDNN
        env:
          ONEDNN_ACTION: build

      - name: Create archive with preserved permissions
        working-directory: ${{ github.workspace }}/oneDNN
        run: |
          tar -czf build.tar.gz build

      # Upload build artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-artifact
          path: |
            ${{ github.workspace }}/oneDNN/build.tar.gz
          retention-days: 1

  test:
    needs: [scope, build]
    strategy:
      fail-fast: false
      # SMOKE -> {"vlen":[128,256]} (2 jobs); CI -> vlen x part (20 jobs, balanced).
      matrix: ${{ fromJSON(needs.scope.outputs.matrix) }}

    name: riscv-test-vlen${{ matrix.vlen }}${{ matrix.part && format(', part-{0}', matrix.part) || '' }}
    runs-on: ubuntu-24.04
    env:
      QEMU_CPU: "rv64,v=true,vlen=${{ matrix.vlen }},vext_spec=v1.0,zvfh=true,zvfbfmin=true,zvfbfwma=true"
    steps:
      - name: Checkout oneDNN
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          path: oneDNN

      - name: Read version file
        id: get-versions
        run: |
          content=`cat ${{ github.workspace }}/oneDNN/.github/automation/riscv/ci.json`
          content="${content//[$'\t\r\n$ ']}"
          echo "output=$content" >> $GITHUB_OUTPUT

      # Setup QEMU for RISC-V platform support. Pin a recent binfmt image so QEMU
      # is new enough to model the V, Zvfh and BF16 (Zvfbfmin/Zvfbfwma) extensions;
      # the version is printed by the "Verify QEMU" step below so the image can be
      # pinned to a digest later.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          platforms: riscv64
          image: tonistiigi/binfmt:latest

      # Install cross-compilation tools
      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-${{ fromJson(steps.get-versions.outputs.output).dependencies.gcc }}-riscv64-linux-gnu g++-${{ fromJson(steps.get-versions.outputs.output).dependencies.gcc }}-riscv64-linux-gnu

      # Download build artifacts
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-artifact
          path: ${{ github.workspace }}/oneDNN/

      - name: Extract archive
        working-directory: ${{ github.workspace }}/oneDNN/
        run: |
          tar -xzf build.tar.gz

      - name: Verify QEMU supports RVV extensions (zvfh/bf16)
        working-directory: ${{ github.workspace }}/oneDNN/build
        run: bash ${{ github.workspace }}/oneDNN/.github/automation/riscv/qemu-check.sh

      - name: Run oneDNN tests
        run: ${{ github.workspace }}/oneDNN/.github/automation/riscv/test.sh
        working-directory: ${{ github.workspace }}/oneDNN/build
        env:
          CTEST_PARALLEL_LEVEL: 4
          ONEDNN_TEST_PARTITION: balanced
          ONEDNN_THREADING: OMP
          ONEDNN_TEST_SET: ${{ needs.scope.outputs.testset }}
          ONEDNN_TEST_PART: ${{ matrix.part }}
          ONEDNN_TEST_STRIDE: 10

  # This job adds a check named "CI RISC-V" that represents overall
  # workflow status and can be used in branch rulesets
  status:
    needs: [build, test]
    runs-on: ubuntu-24.04
    name: "CI RISC-V"
    steps:
      - name: Print success
        run: echo Success
